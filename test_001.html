<script>
window.addEventListener("scroll", function(){
var scroll = window.scrollY;
var height = document.body.getClientRects()[0].height;
var percent = scroll/height*100;
if(scroll > (height*1)/2){
   jQuery('ul.nav.flex-scroll-x').scrollLeft((percent*5));
}else{
   jQuery('ul.nav.flex-scroll-x').scrollLeft(0);
}

});
</script>

jQuery('.mvideo video').trigger('play');

<script>
function playVideo(){
jQuery('.mvideo video').trigger('play');
jQuery('.play-btn span.zpbutton-content').html('Pause Video');
return false;
}

function pauseVideo(){
jQuery('.mvideo video').trigger('pause');
jQuery('.play-btn span.zpbutton-content').html('Play Video');
return false;
}
</script>
